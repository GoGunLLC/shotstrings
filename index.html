<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShotStrings — Hello World</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 30% 20%, #1b2a4a, #0a0f1c 70%);
      color: #e8eefc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 560px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 40px;
      backdrop-filter: blur(8px);
    }
    .badge {
      display: inline-block;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7fb0ff;
      margin-bottom: 16px;
    }
    h1 { font-size: 40px; line-height: 1.1; margin-bottom: 14px; }
    p { font-size: 17px; line-height: 1.6; color: #aebbd6; }
    .dot { color: #4ade80; }
    code {
      background: rgba(255,255,255,0.08);
      padding: 2px 7px;
      border-radius: 6px;
      font-size: 14px;
    }
    .foot { margin-top: 28px; font-size: 13px; color: #6b7896; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">ShotStrings</span>
    <h1>Hello, world <span class="dot">●</span></h1>
    <p>If you're seeing this live at your domain, your workflow is working:
       edit a file → push to GitHub → Vercel deploys automatically.</p>
    <p class="foot">Edit <code>index.html</code> to change this page.</p>
    <p class="foot" style="margin-top:10px;color:#4ade80;">✦ Testing the full loop ✦</p>
  </div>
</body>
</html>
